<!DOCTYPE html>
<html lang="hi" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hindi → Haryanvi TTS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* ── Design tokens ─────────────────────────────────────────────────── */
    :root {
      --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
      --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
      --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
      --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
      --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);

      --space-1:  0.25rem; --space-2:  0.5rem;  --space-3:  0.75rem;
      --space-4:  1rem;    --space-5:  1.25rem; --space-6:  1.5rem;
      --space-8:  2rem;    --space-10: 2.5rem;  --space-12: 3rem;
      --space-16: 4rem;

      --radius-sm: 0.375rem; --radius-md: 0.5rem;
      --radius-lg: 0.75rem;  --radius-xl: 1rem;  --radius-full: 9999px;

      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --font-body:    'Inter', system-ui, sans-serif;
      --font-deva:    'Noto Sans Devanagari', serif;
    }

    /* ── Dark palette (default) ────────────────────────────────────────── */
    :root, [data-theme="dark"] {
      --bg:              #0f0f0f;
      --surface:         #161616;
      --surface-2:       #1e1e1e;
      --surface-3:       #262626;
      --border:          rgba(255,255,255,0.08);
      --text:            #e8e8e8;
      --text-muted:      #888;
      --text-faint:      #444;
      --primary:         #5b9cf6;
      --primary-hover:   #3b82f6;
      --primary-glow:    rgba(91,156,246,0.18);
      --accent:          #a78bfa;
      --success:         #34d399;
      --error:           #f87171;
      --shadow-md:       0 4px 24px rgba(0,0,0,0.5);
      --shadow-lg:       0 12px 48px rgba(0,0,0,0.7);
    }

    /* ── Light palette ─────────────────────────────────────────────────── */
    [data-theme="light"] {
      --bg:              #f5f5f4;
      --surface:         #ffffff;
      --surface-2:       #fafaf9;
      --surface-3:       #f0efed;
      --border:          rgba(0,0,0,0.08);
      --text:            #1a1a1a;
      --text-muted:      #666;
      --text-faint:      #bbb;
      --primary:         #2563eb;
      --primary-hover:   #1d4ed8;
      --primary-glow:    rgba(37,99,235,0.12);
      --accent:          #7c3aed;
      --success:         #059669;
      --error:           #dc2626;
      --shadow-md:       0 4px 24px rgba(0,0,0,0.08);
      --shadow-lg:       0 12px 48px rgba(0,0,0,0.12);
    }

    /* ── Base reset ────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body {
      min-height: 100dvh;
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--text);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--space-6) var(--space-4);
    }
    button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }
    textarea, input { font: inherit; color: inherit; }
    img, svg { display: block; max-width: 100%; }
    :focus-visible { outline: 2px solid var(--primary); outline-offset: 3px; border-radius: var(--radius-sm); }

    /* ── Header ────────────────────────────────────────────────────────── */
    header {
      width: 100%;
      max-width: 780px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: var(--space-6);
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--space-8);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .logo svg { flex-shrink: 0; }
    .logo-text { line-height: 1.2; }
    .logo-title {
      font-size: var(--text-base);
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    .logo-sub {
      font-size: var(--text-xs);
      color: var(--text-muted);
    }
    .theme-btn {
      width: 36px; height: 36px;
      border-radius: var(--radius-full);
      background: var(--surface-2);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      transition: background var(--transition), color var(--transition);
    }
    .theme-btn:hover { background: var(--surface-3); color: var(--text); }

    /* ── Main card ─────────────────────────────────────────────────────── */
    main {
      width: 100%;
      max-width: 780px;
      display: flex;
      flex-direction: column;
      gap: var(--space-5);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: var(--space-6);
      box-shadow: var(--shadow-md);
    }

    .card-label {
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: var(--space-3);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    .card-label .dot {
      width: 6px; height: 6px;
      border-radius: var(--radius-full);
      background: var(--primary);
    }

    /* ── Textarea ──────────────────────────────────────────────────────── */
    textarea {
      width: 100%;
      min-height: 120px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      font-family: var(--font-deva);
      font-size: var(--text-base);
      line-height: 1.7;
      resize: vertical;
      color: var(--text);
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    textarea::placeholder { color: var(--text-faint); font-family: var(--font-deva); }
    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    /* ── Char count ────────────────────────────────────────────────────── */
    .char-count {
      font-size: var(--text-xs);
      color: var(--text-faint);
      text-align: right;
      margin-top: var(--space-2);
    }

    /* ── Pipeline steps ────────────────────────────────────────────────── */
    .steps {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin: var(--space-4) 0;
    }
    .step {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-xs);
      font-weight: 500;
      color: var(--text-faint);
      transition: color var(--transition);
    }
    .step.active  { color: var(--primary); }
    .step.done    { color: var(--success); }
    .step.error   { color: var(--error); }
    .step-icon {
      width: 24px; height: 24px;
      border-radius: var(--radius-full);
      background: var(--surface-3);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      transition: background var(--transition), border-color var(--transition);
      font-size: 11px;
      flex-shrink: 0;
    }
    .step.active .step-icon  { background: var(--primary-glow); border-color: var(--primary); }
    .step.done   .step-icon  { background: rgba(52,211,153,0.15); border-color: var(--success); }
    .step.error  .step-icon  { background: rgba(248,113,113,0.15); border-color: var(--error); }
    .step-arrow { color: var(--border); font-size: var(--text-xs); }

    /* ── Spinner ───────────────────────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 12px; height: 12px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: var(--radius-full);
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .active .spinner { display: block; }
    .active .step-num { display: none; }

    /* ── Translate button ──────────────────────────────────────────────── */
    .btn-primary {
      width: 100%;
      padding: var(--space-3) var(--space-6);
      background: var(--primary);
      color: #fff;
      border-radius: var(--radius-lg);
      font-weight: 600;
      font-size: var(--text-sm);
      letter-spacing: 0.01em;
      transition: background var(--transition), box-shadow var(--transition), transform var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--primary-hover);
      box-shadow: 0 0 0 4px var(--primary-glow);
    }
    .btn-primary:active:not(:disabled) { transform: scale(0.98); }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: var(--radius-full);
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .loading .btn-spinner { display: block; }
    .loading .btn-text    { display: none; }

    /* ── Result cards ──────────────────────────────────────────────────── */
    .result-text {
      font-family: var(--font-deva);
      font-size: var(--text-base);
      line-height: 1.8;
      color: var(--text);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      min-height: 56px;
      word-break: break-word;
    }
    .result-placeholder { color: var(--text-faint); font-style: italic; font-family: var(--font-body); }

    /* ── Audio player ──────────────────────────────────────────────────── */
    .audio-wrap {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }
    audio {
      width: 100%;
      border-radius: var(--radius-lg);
      background: var(--surface-2);
      accent-color: var(--primary);
    }
    audio::-webkit-media-controls-panel { background: var(--surface-2); }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-xs);
      font-weight: 500;
      color: var(--primary);
      background: var(--primary-glow);
      border: 1px solid rgba(91,156,246,0.25);
      border-radius: var(--radius-full);
      padding: var(--space-1) var(--space-3);
      transition: background var(--transition);
      text-decoration: none;
      cursor: pointer;
      width: fit-content;
    }
    .download-btn:hover { background: rgba(91,156,246,0.28); }

    /* ── Error banner ──────────────────────────────────────────────────── */
    .error-banner {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: var(--radius-lg);
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-sm);
      color: var(--error);
      display: none;
    }
    .error-banner.visible { display: block; }

    /* ── Footer ────────────────────────────────────────────────────────── */
    footer {
      margin-top: var(--space-10);
      font-size: var(--text-xs);
      color: var(--text-faint);
      text-align: center;
    }

    /* ── Fade-in animation ─────────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeUp 0.35s cubic-bezier(0.16,1,0.3,1) forwards; }

    /* ── Mobile ────────────────────────────────────────────────────────── */
    @media (max-width: 500px) {
      body { padding: var(--space-4) var(--space-3); }
      .card { padding: var(--space-4); }
      .steps { flex-wrap: wrap; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────── -->
<header>
  <div class="logo">
    <!-- Inline SVG logo -->
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none" aria-label="Hindi-Haryanvi TTS logo" xmlns="http://www.w3.org/2000/svg">
      <rect width="36" height="36" rx="9" fill="var(--primary)" opacity="0.15"/>
      <path d="M10 12 L10 24 M10 18 L17 18 M17 12 L17 24" stroke="var(--primary)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M21 15 Q21 12 24.5 12 Q28 12 28 15.5 Q28 19 24.5 19.5 Q21 20 21 23 Q21 26 24.5 26 Q28 26 28 23" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round"/>
    </svg>
    <div class="logo-text">
      <div class="logo-title">Hindi → Haryanvi</div>
      <div class="logo-sub">LLaMA 3.1 + VITS TTS Pipeline</div>
    </div>
  </div>
  <button class="theme-btn" data-theme-toggle aria-label="Switch to light mode">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>
</header>

<!-- ── Main ─────────────────────────────────────────────────────────────── -->
<main>

  <!-- Input card -->
  <div class="card">
    <div class="card-label"><span class="dot"></span>Hindi Input</div>
    <textarea
      id="hindi-input"
      placeholder="यहाँ हिंदी में लिखें…  (Type Hindi text here)"
      maxlength="1000"
      rows="4"
      spellcheck="false"
    ></textarea>
    <div class="char-count"><span id="char-count">0</span> / 1000</div>
  </div>

  <!-- Pipeline steps -->
  <div class="steps" role="status" aria-live="polite">
    <div class="step" id="step-translate" aria-label="Translation stage">
      <div class="step-icon">
        <span class="step-num">1</span>
        <span class="spinner"></span>
      </div>
      <span>Translate</span>
    </div>
    <div class="step-arrow">›</div>
    <div class="step" id="step-tts" aria-label="Speech synthesis stage">
      <div class="step-icon">
        <span class="step-num">2</span>
        <span class="spinner"></span>
      </div>
      <span>Synthesise</span>
    </div>
    <div class="step-arrow">›</div>
    <div class="step" id="step-done" aria-label="Complete">
      <div class="step-icon"><span class="step-num">✓</span></div>
      <span>Done</span>
    </div>
  </div>

  <!-- Error banner -->
  <div class="error-banner" id="error-banner" role="alert"></div>

  <!-- Submit -->
  <button class="btn-primary" id="submit-btn">
    <span class="btn-text">▶ Run Pipeline</span>
    <span class="btn-spinner"></span>
  </button>

  <!-- Translation result -->
  <div class="card" id="translation-card" style="display:none">
    <div class="card-label"><span class="dot" style="background:var(--accent)"></span>Haryanvi Translation</div>
    <div class="result-text" id="haryanvi-result">
      <span class="result-placeholder">Translation will appear here…</span>
    </div>
  </div>

  <!-- Audio result -->
  <div class="card" id="audio-card" style="display:none">
    <div class="card-label"><span class="dot" style="background:var(--success)"></span>Synthesised Speech</div>
    <div class="audio-wrap">
      <audio id="audio-player" controls preload="auto"></audio>
      <a class="download-btn" id="download-btn" download="haryanvi_speech.wav">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 3v14M5 15l7 7 7-7"/><path d="M3 21h18"/></svg>
        Download WAV
      </a>
    </div>
  </div>

</main>

<footer>Hindi → Haryanvi translation · LLaMA 3.1 8B QLoRA + Coqui VITS</footer>

<!-- ── Script ────────────────────────────────────────────────────────────── -->
<script>
(function () {
  const input      = document.getElementById('hindi-input');
  const charCount  = document.getElementById('char-count');
  const submitBtn  = document.getElementById('submit-btn');
  const errorBanner= document.getElementById('error-banner');
  const tCard      = document.getElementById('translation-card');
  const aCard      = document.getElementById('audio-card');
  const hResult    = document.getElementById('haryanvi-result');
  const audioPlayer= document.getElementById('audio-player');
  const downloadBtn= document.getElementById('download-btn');

  const stepT  = document.getElementById('step-translate');
  const stepS  = document.getElementById('step-tts');
  const stepD  = document.getElementById('step-done');

  // ── Theme toggle ───────────────────────────────────────────────────────
  const html = document.documentElement;
  let theme = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
  html.setAttribute('data-theme', theme);
  const themeBtn = document.querySelector('[data-theme-toggle]');
  themeBtn.addEventListener('click', () => {
    theme = theme === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', theme);
    themeBtn.setAttribute('aria-label', `Switch to ${theme === 'dark' ? 'light' : 'dark'} mode`);
    themeBtn.innerHTML = theme === 'dark'
      ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`
      : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`;
  });

  // ── Char counter ───────────────────────────────────────────────────────
  input.addEventListener('input', () => {
    charCount.textContent = input.value.length;
  });

  // ── Step helpers ───────────────────────────────────────────────────────
  function resetSteps() {
    [stepT, stepS, stepD].forEach(s => s.classList.remove('active','done','error'));
  }
  function setStep(el, state) {
    el.classList.remove('active','done','error');
    if (state) el.classList.add(state);
  }

  // ── Error helper ───────────────────────────────────────────────────────
  function showError(msg) {
    errorBanner.textContent = '⚠ ' + msg;
    errorBanner.classList.add('visible');
  }
  function clearError() {
    errorBanner.classList.remove('visible');
    errorBanner.textContent = '';
  }

  // ── Main pipeline call ─────────────────────────────────────────────────
  submitBtn.addEventListener('click', async () => {
    const text = input.value.trim();
    if (!text) { showError('Please enter some Hindi text.'); return; }

    clearError();
    submitBtn.disabled = true;
    submitBtn.classList.add('loading');
    resetSteps();
    tCard.style.display = 'none';
    aCard.style.display = 'none';

    // Stage 1 active
    setStep(stepT, 'active');

    try {
      const res = await fetch('/api/pipeline', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(err.detail || 'Pipeline failed.');
      }

      const data = await res.json();

      // Stage 1 done → stage 2 active (visual beat)
      setStep(stepT, 'done');
      setStep(stepS, 'active');

      // Show translation
      hResult.textContent = data.haryanvi;
      tCard.style.display = 'block';
      tCard.classList.add('fade-in');

      // Stage 2 done
      setStep(stepS, 'done');
      setStep(stepD, 'done');

      // Load audio
      audioPlayer.src = data.audio_url;
      downloadBtn.href = data.audio_url;
      aCard.style.display = 'block';
      aCard.classList.add('fade-in');
      audioPlayer.play().catch(() => {});   // autoplay (may be blocked)

    } catch (err) {
      setStep(stepT, 'error');
      setStep(stepS, 'error');
      showError(err.message);
    } finally {
      submitBtn.disabled = false;
      submitBtn.classList.remove('loading');
    }
  });

  // ── Allow Ctrl+Enter to submit ─────────────────────────────────────────
  input.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') submitBtn.click();
  });
})();
</script>
</body>
</html>
